<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body class="body">
  <header class="header">
    <img class="header__img" src="./eisenhower-matrix.jpg" alt="Eisenhower matrix image">
    <a class="header__more-inf"
       href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>
  <main class="main">
    <section class="tasks-container">
      <h3 class="tasks-container__title">
        Add Item
      </h3>
      <div class="tasks-container__item tasks-container__item_new-task">
        <label for="new-task" class="tasks-container__label"></label>
        <input id="new-task"
               class="tasks-container__input"
               type="text">
        <button class="tasks-container__btn">Add</button>
      </div>
    </section>
    <section class="tasks-container">
      <h3 class="tasks-container__title">Todo</h3>
      <ul id="uncompleted" class="tasks-container__task-list">
        <li class="tasks-container__item">
          <input type="checkbox" class="tasks-container__checkbox">
          <label class="tasks-container__label">Pay Bills</label>
          <input type="text" class="tasks-container__input">
          <button class="tasks-container__btn tasks-container__btn_edit">Edit</button>
          <button class="tasks-container__btn  tasks-container__btn_delete">
            <img src="./remove.svg" class="tasks-container__icon" alt="Delete icon">
          </button>
        </li>
        <li class="tasks-container__item tasks-container__item_editMode">
          <input type="checkbox" class="tasks-container__checkbox">
          <label class="tasks-container__label">Go Shopping</label>
          <input type="text"
                 value="Go Shopping"
                 class="tasks-container__input">
          <button class="tasks-container__btn tasks-container__btn_edit">Save</button>
          <button class="tasks-container__btn tasks-container__btn_delete">
            <img src="./remove.svg" class="tasks-container__icon" alt="Delete icon">
          </button>
        </li>
      </ul>
    </section>
    <section class="tasks-container">
      <h3 class="tasks-container__title">Completed</h3>
      <ul id="completed" class="tasks-container__task-list">
        <li class="tasks-container__item">
          <input type="checkbox"
                 class="tasks-container__checkbox"
                 checked>
          <label class="tasks-container__label">See the Doctor</label>
          <input type="text" class="tasks-container__input">
          <button class="tasks-container__btn tasks-container__btn_edit">Save</button>
          <button class="tasks-container__btn tasks-container__btn_delete">
            <img src="./remove.svg" class="tasks-container__icon" alt="Delete icon">
          </button>
        </li>
      </ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
